<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>SpaceOS VR – microbricks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

    <style>
      body { margin: 0; }
    </style>
  </head>

  <body>
    <a-scene vr-mode-ui="enabled: true">

      <!-- Camera + cursor -->
      <a-entity id="cameraRig" camera look-controls>
        <a-cursor></a-cursor>
      </a-entity>

      <!-- Dock -->
      <a-entity id="dock" position="0 0.5 -3">
        <a-circle id="openBrowser" radius="0.15" color="#7ED321" position="0 0 0"></a-circle>
      </a-entity>

      <!-- VR-browser met toetsenbord -->
      <a-plane id="browserApp" visible="false"
               position="0 1.5 -3" width="2.4" height="2" color="#333">

        <!-- Titel -->
        <a-text value="VR Browser" position="-1.1 0.9 0.01"></a-text>

        <!-- Adresbalk -->
        <a-plane id="addressBar" width="2" height="0.25" color="#555" position="0 0.6 0.01">
          <a-text id="addressText" value="https://example.com"
                  position="-0.95 0 0.01" wrap-count="60"></a-text>
        </a-plane>

        <!-- Content container -->
        <a-entity id="browserContent" position="0 -0.1 0.01"></a-entity>

        <!-- Sluitknop -->
        <a-plane id="browserClose" position="1.1 0.9 0.01"
                 width="0.2" height="0.2" color="red">
          <a-text value="X" align="center" position="0 0 0.01"></a-text>
        </a-plane>

        <!-- VR-toetsenbord -->
        <a-entity id="keyboard" position="-2 -1 0.02"></a-entity>
      </a-plane>

      <a-sky color="#111"></a-sky>
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
