<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>SpaceOS Hand Controller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
    #pad {
      position:fixed; inset:0;
      background:#111;
      touch-action:none;
    }
    #status {
      position:fixed; top:10px; left:10px;
      background:#222; padding:6px 10px; border-radius:6px;
      font-size:14px;
    }
    #controls {
      position:fixed; bottom:10px; left:10px;
    }
    button {
      padding:8px 14px; margin:4px;
      background:#333; color:#fff; border:1px solid #555;
      border-radius:6px;
    }
  </style>
</head>
<body>

<div id="status">Niet verbonden</div>

<div id="controls">
  <button id="start">Start verbinding</button>
  <button id="copyOffer">Kopieer offer</button>
  <button id="pasteAnswer">Plak answer</button>
</div>

<div id="pad"></div>

<script src="controller.js"></script>
</body>
</html>
