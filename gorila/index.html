<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Gorilla Tag VR (met iPad Controller)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>
<body>

<a-scene vr-mode-ui="enabled: true">

  <!-- Camera rig -->
  <a-entity id="cameraRig" position="0 1.6 0">
    <a-entity camera look-controls></a-entity>
  </a-entity>

  <!-- Gorilla Tag wereld -->
  <a-entity id="gorillaWorld">

    <!-- Ground -->
    <a-plane color="#228B22"
             width="30" height="30"
             rotation="-90 0 0"
             position="0 0 0"></a-plane>

    <!-- Boom -->
    <a-cylinder color="#8B4513"
                height="4"
                radius="0.4"
                position="0 2 -5"></a-cylinder>
    <a-sphere color="#2ECC71"
              radius="2"
              position="0 4 -5"></a-sphere>

    <!-- Platforms -->
    <a-box color="#A0522D"
           width="3" height="0.3" depth="3"
           position="3 2 -4"></a-box>
    <a-box color="#A0522D"
           width="3" height="0.3" depth="3"
           position="-3 3 -6"></a-box>

    <!-- Info -->
    <a-plane color="#000"
             width="3" height="1.2"
             position="0 2 -3">
      <a-text value="Gorilla Tag VR
Besturing via iPad Controller:
- forward
- jump
- climb
- tag"
              align="center"
              wrap-count="30"
              position="-1.3 0.3 0.01"></a-text>
    </a-plane>

  </a-entity>

  <a-sky color="#87CEEB"></a-sky>
</a-scene>

<script src="vr.js"></script>
</body>
</html>
