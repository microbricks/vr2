<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>SpaceOS Pro VR</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="script.js" defer></script>

  <style>
    * { box-sizing: border-box; }
    body { margin:0; overflow:hidden; font-family: system-ui, sans-serif; }

    /* CAMERA ACHTERGROND */
    #bgVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      display: none;
    }

    /* OS UI */
    #dock {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
      z-index: 10;
    }

    .dock-btn {
      padding: 10px 18px;
      background: rgba(10,10,10,0.85);
      color: #fff;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    /* WINDOWS */
    .window {
      position: fixed;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      max-width: 800px;
      height: 60vh;
      background: rgba(15,15,20,0.92);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 9;
      backdrop-filter: blur(12px);
    }

    .window-header {
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .window-title {
      opacity: 0.9;
    }

    .window-close {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      border: none;
      background: #ff5f57;
      cursor: pointer;
    }

    .window-body {
      padding: 10px;
      height: 100%;
      overflow: auto;
      font-size: 14px;
    }

    #notesArea {
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      padding: 8px;
      border-radius: 8px;
      resize: none;
    }

    #browserFrame {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 10px;
      background: #111;
    }

    #settingsBody label {
      display: block;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

<!-- CAMERA ACHTERGROND -->
<video id="bgVideo" autoplay playsinline></video>

<!-- DOCK / HOMESCREEN -->
<div id="dock">
  <button class="dock-btn" data-app="browser">Browser</button>
  <button class="dock-btn" data-app="notes">Notities</button>
  <button class="dock-btn" data-app="settings">Instellingen</button>
  <button class="dock-btn" id="cameraBgBtn">AR Background</button>
</div>

<!-- WINDOWS -->
<div class="window" id="win-browser">
  <div class="window-header">
    <span class="window-title">VR Browser</span>
    <button class="window-close" data-close="browser"></button>
  </div>
  <div class="window-body">
    <iframe id="browserFrame" src="https://example.com"></iframe>
  </div>
</div>

<div class="window" id="win-notes">
  <div class="window-header">
    <span class="window-title">Notities</span>
    <button class="window-close" data-close="notes"></button>
  </div>
  <div class="window-body">
    <textarea id="notesArea" placeholder="Schrijf hier je VR-notities..."></textarea>
  </div>
</div>

<div class="window" id="win-settings">
  <div class="window-header">
    <span class="window-title">SpaceOS Instellingen</span>
    <button class="window-close" data-close="settings"></button>
  </div>
  <div class="window-body" id="settingsBody">
    <label>
      Joy-Con locomotion:
      <span id="joyconStatus">Niet gedetecteerd</span>
    </label>
    <label>
      Keyboard locomotion:
      <span id="keyboardStatus">Actief (WASD)</span>
    </label>
    <label>
      AR Background:
      <span id="arStatus">Uit</span>
    </label>
  </div>
</div>

<!-- VR SCENE -->
<a-scene>
  <a-entity id="cameraRig" position="0 1.6 0">
    <a-entity camera look-controls></a-entity>
  </a-entity>

  <a-sky id="sky" color="#05060a"></a-sky>
  <a-plane color="#20252b" width="40" height="40" rotation="-90 0 0"></a-plane>
</a-scene>

</body>
</html>
