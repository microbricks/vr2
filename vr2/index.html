<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>SpaceOS VR (full rebuild)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="script.js" defer></script>

  <style>
    body { margin:0; overflow:hidden; }
    #bgVideo {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: -2;
      display: none;
    }
    #centerDot {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 8px;
      height: 8px;
      margin-left: -4px;
      margin-top: -4px;
      border-radius: 50%;
      background: white;
      opacity: 0.8;
      z-index: 20;
    }
    #gazeCircle {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 40px;
      height: 40px;
      margin-left: -20px;
      margin-top: -20px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      box-sizing: border-box;
      z-index: 19;
      pointer-events: none;
      transform: rotate(-90deg);
      display: none;
      background: conic-gradient(
        rgba(74,140,255,1) 0deg,
        rgba(74,140,255,1) 0deg,
        rgba(255,255,255,0) 0deg
      );
    }
  </style>
</head>
<body>

<video id="bgVideo" autoplay playsinline></video>
<div id="centerDot"></div>
<div id="gazeCircle"></div>

<a-scene>

  <!-- CAMERA RIG -->
  <a-entity id="cameraRig" position="0 1.6 0">
    <a-entity camera look-controls></a-entity>
  </a-entity>

  <!-- META-HOME OMGEVING -->
  <a-sky id="sky" color="#1a1f2b"></a-sky>

  <a-cylinder 
    position="0 0 0" 
    radius="6" 
    height="0.2" 
    color="#2a2f3b"
    material="metalness:0.4; roughness:0.2;">
  </a-cylinder>

  <a-plane 
    position="0 2 -6" 
    width="12" 
    height="6" 
    color="#20242f"
    material="opacity:0.9; metalness:0.3; roughness:0.4;">
  </a-plane>

  <a-ring 
    position="0 2 -5.9"
    radius-inner="5.5"
    radius-outer="5.7"
    color="#4a8cff"
    material="emissive:#4a8cff; emissiveIntensity:0.6;">
  </a-ring>

  <a-entity light="type: ambient; intensity: 0.8"></a-entity>
  <a-entity light="type: directional; intensity: 0.6" position="2 4 1"></a-entity>

  <!-- 3D APP TILES -->
  <a-plane id="tile-browser"
           position="-2 1.4 -4"
           width="1.6" height="0.8"
           color="#303545"
           material="shader: standard; metalness:0.3; roughness:0.4"
           class="clickable"
           text="value: Browser; align: center; color: #FFFFFF; width: 3;">
  </a-plane>

  <a-plane id="tile-notes"
           position="0 1.4 -4"
           width="1.6" height="0.8"
           color="#303545"
           material="shader: standard; metalness:0.3; roughness:0.4"
           class="clickable"
           text="value: Notities; align: center; color: #FFFFFF; width: 3;">
  </a-plane>

  <a-plane id="tile-settings"
           position="2 1.4 -4"
           width="1.6" height="0.8"
           color="#303545"
           material="shader: standard; metalness:0.3; roughness:0.4"
           class="clickable"
           text="value: Instellingen; align: center; color: #FFFFFF; width: 3;">
  </a-plane>

  <a-plane id="tile-ar"
           position="0 0.4 -4"
           width="1.6" height="0.6"
           color="#264b7b"
           material="shader: standard; metalness:0.4; roughness:0.3"
           class="clickable"
           text="value: AR Background; align: center; color: #FFFFFF; width: 3;">
  </a-plane>

  <!-- 3D PANELS -->
  <a-plane id="panel-browser"
           position="0 2 -3"
           width="3.5" height="2"
           color="#181a22"
           visible="false"
           material="shader: standard; metalness:0.2; roughness:0.5">
  </a-plane>

  <a-plane id="panel-notes"
           position="0 2 -3"
           width="3.5" height="2"
           color="#181a22"
           visible="false"
           material="shader: standard; metalness:0.2; roughness:0.5">
  </a-plane>

  <a-plane id="panel-settings"
           position="0 2 -3"
           width="3.5" height="2"
           color="#181a22"
           visible="false"
           material="shader: standard; metalness:0.2; roughness:0.5">
  </a-plane>

  <!-- PANEL TEXT -->
  <a-entity id="panel-browser-text"
            position="0 2 -2.9"
            text="value: Browser geopend (dummy); align: center; color: #FFFFFF; width: 4;"
            visible="false"></a-entity>

  <a-entity id="panel-notes-text"
            position="0 2 -2.9"
            text="value: Notities: hier komt later echte input; align: center; color: #FFFFFF; width: 4;"
            visible="false"></a-entity>

  <a-entity id="panel-settings-text"
            position="0 2 -2.9"
            text="value: Instellingen: Joy-Con, keyboard, AR status; align: center; color: #FFFFFF; width: 4;"
            visible="false"></a-entity>

</a-scene>

</body>
</html>
